spring.application.name=clubops
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/clubops_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

app.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-before-deploying}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
