spring.application.name=clubops-backend
spring.profiles.active=local

spring.datasource.url=jdbc:mysql://localhost:3306/clubops_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

jwt.secret=clubops-super-secret-key-for-development-only-change-later
jwt.expiration=86400000